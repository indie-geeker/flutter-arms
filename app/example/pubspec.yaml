name: example
description: "Reference app showcasing flutter-arms bootstrap profiles and feature slices."
homepage: https://github.com/indie-geeker/flutter-arms
repository: https://github.com/indie-geeker/flutter-arms
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.2"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Local packages
  core:
    path: ../../packages/core
  interfaces:
    path: ../../packages/interfaces
  module_storage:
    path: ../../packages/modules/module_storage
  module_logger:
    path: ../../packages/modules/module_logger
  module_cache:
    path: ../../packages/modules/module_cache
  module_network:
    path: ../../packages/modules/module_network

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Routing
  auto_route: ^11.1.0

  # Code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.11.1
  auto_route_generator: ^10.4.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_generator: ^4.0.0+1

  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
