name: Flutter Arms CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Melos
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Workspace
        run: melos bootstrap

      - name: Analyze Core Packages
        run: |
          melos exec --scope="core" -- flutter analyze
          melos exec --scope="interfaces" -- flutter analyze
          melos exec --scope="module_logger" -- flutter analyze
          melos exec --scope="module_storage" -- flutter analyze
          melos exec --scope="module_cache" -- flutter analyze
          melos exec --scope="module_network" -- flutter analyze

      - name: Test Core Packages
        run: |
          melos exec --scope="core" -- flutter test
          melos exec --scope="interfaces" -- flutter test
          melos exec --scope="module_logger" -- flutter test
          melos exec --scope="module_storage" -- flutter test
          melos exec --scope="module_cache" -- flutter test
          melos exec --scope="module_network" -- flutter test

      - name: Verify Empty Test Files
        run: |
          test -s packages/core/test/core_test.dart
          test -s packages/interfaces/test/interfaces_test.dart
          test -s packages/modules/module_storage/test/storage_test.dart
          test -s packages/modules/module_network/test/module_network_test.dart
