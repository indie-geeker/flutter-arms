name: Flutter Arms CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Keep this pinned version aligned with .fvmrc and README.
          flutter-version: 3.41.2
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Setup Melos
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Workspace
        run: melos bootstrap

      - name: Generate Example App Code
        run: |
          cd app/example
          dart run build_runner build --delete-conflicting-outputs

      - name: Example Profile Smoke
        run: |
          cd app/example
          flutter test test/app_bootstrap_env_smoke_test.dart --dart-define=ARMS_EXPECT_FULL_STACK=false
          flutter test test/app_bootstrap_env_smoke_test.dart --dart-define=ARMS_EXAMPLE_FULL_STACK=true --dart-define=ARMS_EXPECT_FULL_STACK=true

      - name: Architecture Dependency Guard
        run: melos run lint:arch

      - name: Analyze Workspace
        run: |
          melos exec --concurrency=1 -- flutter analyze

      - name: Collect Coverage Reports
        run: |
          melos exec --concurrency=1 -- flutter test --coverage

      - name: Coverage Gate
        env:
          MIN_TOTAL_COVERAGE: 75
          MIN_PACKAGE_COVERAGE: 70
        run: |
          chmod +x scripts/check_coverage.sh
          scripts/check_coverage.sh

      - name: Verify Empty Test Files
        run: |
          test -s packages/core/test/core_test.dart
          test -s packages/interfaces/test/interfaces_test.dart
          test -s packages/modules/module_storage/test/storage_test.dart
          test -s packages/modules/module_network/test/module_network_test.dart
          test -s app/example/test/widget_test.dart
