name: Flutter Arms Quality Stage

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  coverage_gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          channel: stable

      - name: Setup Melos
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Workspace
        run: melos bootstrap

      - name: Generate Example App Code
        run: |
          cd app/example
          dart run build_runner build --delete-conflicting-outputs

      - name: Collect Coverage Reports
        run: |
          melos exec --scope="core" -- flutter test --coverage
          melos exec --scope="interfaces" -- flutter test --coverage
          melos exec --scope="module_logger" -- flutter test --coverage
          melos exec --scope="module_storage" -- flutter test --coverage
          melos exec --scope="module_cache" -- flutter test --coverage
          melos exec --scope="module_network" -- flutter test --coverage
          melos exec --scope="example" -- flutter test --coverage

      - name: Coverage Gate
        env:
          MIN_TOTAL_COVERAGE: 60
          MIN_PACKAGE_COVERAGE: 50
        run: |
          chmod +x scripts/check_coverage.sh
          scripts/check_coverage.sh
