name: flutter_arms

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: ">=3.41.2"

workspace:
  - packages/core
  - packages/interfaces
  - packages/modules/module_logger
  - packages/modules/module_storage
  - packages/modules/module_cache
  - packages/modules/module_network
  - packages/modules/module_analytics
  - packages/modules/module_crash
  - packages/modules/module_notification
  - app/example


dependencies:
  intl: ^0.20.2
  # state management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  # router
  auto_route: ^11.1.0
  # network
  dio: ^5.9.1
  # json
  json_annotation: ^4.9.0
  # extend models
  freezed_annotation: ^3.1.0
  # extra tools
  crypto: ^3.0.7
  hive_ce: ^2.19.3
  get_it: ^9.2.1

dev_dependencies:
  melos: ^7.4.0
  test: ^1.26.0
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  riverpod_generator: ^4.0.0+1
  auto_route_generator: ^10.4.0
  retrofit_generator: ^10.2.1
  json_serializable: ^6.11.2
  freezed: ^3.2.3

melos:
  scripts:
    codegen:example:
      description: Generate required code for app/example.
      run: |
        cd app/example
        dart run build_runner build --delete-conflicting-outputs
    analyze:
      description: Run flutter analyze across all workspace packages.
      run: |
        melos run codegen:example
        melos exec --concurrency=1 -- flutter analyze
    test:
      description: Run flutter test across all workspace packages.
      run: |
        melos run codegen:example
        melos exec --concurrency=1 -- flutter test
    test:coverage:
      description: Run flutter test --coverage across all workspace packages.
      run: |
        melos run codegen:example
        melos exec --concurrency=1 -- flutter test --coverage
    lint:arch:
      description: Enforce architecture dependency boundaries for app/example.
      run: scripts/check_architecture_deps.sh
    create:app:
      description: Scaffold a workspace app from templates.
      run: dart run scripts/create_app.dart
    verify:
      description: Bootstrap workspace, then run analyze and test scripts.
      run: |
        melos bootstrap
        melos run analyze
        melos run test
    doc:
      description: Generate dart doc for interfaces package.
      run: |
        cd packages/interfaces && dart doc .
