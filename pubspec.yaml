name: flutter_arms
description: Flutter Arms - Clean Architecture + MVVM template.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  auto_route: ^10.2.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  flutter_image_compress: ^2.4.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  freezed_annotation: ^3.1.0
  hive_ce: ^2.13.0
  hive_ce_flutter: ^2.3.0
  json_annotation: ^4.9.0
  meta: ^1.16.0
  retrofit: ^4.7.2
  riverpod_annotation: ^3.0.3
  slang: ^4.8.2
  slang_flutter: ^4.14.0
  talker: ^5.0.0
  talker_dio_logger: ^5.0.0
  talker_flutter: ^5.0.0

dev_dependencies:
  auto_route_generator: ^10.2.4
  build_runner: ^2.6.0
  custom_lint: ^0.8.1
  flutter_gen_runner: ^5.10.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  mocktail: ^1.0.4
  path: ^1.9.0
  retrofit_generator: ^10.1.2
  riverpod_generator: ^3.0.3
  slang_build_runner: ^4.8.2
  very_good_analysis: ^9.0.0

flutter:
  uses-material-design: true

# 生成启动屏：
#   dart run flutter_native_splash:create
# 真实项目请替换 assets/splash/logo.png 后再运行。
flutter_native_splash:
  color: "#ffffff"
  color_dark: "#121212"
  image: assets/splash/logo.png
  image_dark: assets/splash/logo.png
  android_12:
    color: "#ffffff"
    color_dark: "#121212"
    image: assets/splash/logo.png
    image_dark: assets/splash/logo.png

# 生成应用图标：
#   dart run flutter_launcher_icons
# 真实项目请替换 assets/icon/app_icon.png 后再运行。
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/icon/app_icon.png
