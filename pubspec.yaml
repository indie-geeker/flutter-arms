name: flutter_arms

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=1.17.0"

workspace:
  - packages/core
  - packages/interfaces
  - packages/modules/module_logger
  - packages/modules/module_storage
  - packages/modules/module_cache
  - packages/modules/module_network
#  - packages/modules/utils
  - app/example


dependencies:
  intl: ^0.20.2
  # state management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  # router
  auto_route: ^10.1.0+1
  # network
  dio: ^5.9.0
  # json
  json_annotation: ^4.9.0
  # extend models
  freezed_annotation: ^3.1.0
  # extra tools
  crypto: ^3.0.6
  hive: ^2.2.3
  get_it: ^9.0.5

dev_dependencies:
  melos: ^7.1.0
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.3
  riverpod_generator: ^3.0.3
  auto_route_generator: ^10.0.1
  retrofit_generator: ^10.0.0
  json_serializable: ^6.9.5
  freezed: ^3.0.6
