name: flutter_arms

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: ">=3.35.7"

workspace:
  - packages/core
  - packages/interfaces
  - packages/modules/module_logger
  - packages/modules/module_storage
  - packages/modules/module_cache
  - packages/modules/module_network
#  - packages/modules/utils
  - app/example


dependencies:
  intl: ^0.20.2
  # state management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # router
  auto_route: ^10.2.3
  # network
  dio: ^5.9.1
  # json
  json_annotation: ^4.9.0
  # extend models
  freezed_annotation: ^3.1.0
  # extra tools
  crypto: ^3.0.7
  hive: ^2.2.3
  get_it: ^9.2.1
  retrofit: 4.9.1

dev_dependencies:
  melos: ^7.4.0
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  riverpod_generator: ^2.6.5
  auto_route_generator: ^10.2.3
  retrofit_generator: ^9.7.0
  json_serializable: ^6.9.5
  freezed: ^3.1.0

melos:
  scripts:
    analyze:
      description: Run flutter analyze across all workspace packages.
      run: melos exec --concurrency=1 -- flutter analyze
    test:
      description: Run flutter test across all workspace packages.
      run: melos exec --concurrency=1 -- flutter test
    test:coverage:
      description: Run flutter test --coverage across all workspace packages.
      run: melos exec --concurrency=1 -- flutter test --coverage
    verify:
      description: Bootstrap workspace, then run analyze and test scripts.
      run: |
        melos bootstrap
        melos run analyze
        melos run test
