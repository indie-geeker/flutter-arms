name: flutter_arms

environment:
  sdk: '>=3.9.2 <4.0.0'
  flutter: ">=3.35.6"

workspace:
  - packages/core
  - packages/interfaces
  - packages/modules/module_logger
  - packages/modules/module_storage
  - packages/modules/module_cache
  - packages/modules/module_network
#  - packages/modules/utils
  - app/example


dependencies:
  intl: ^0.20.2
  # state management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  # router
  auto_route: ^10.3.0
  # network
  dio: ^5.9.0
  # json
  json_annotation: ^4.9.0
  # extend models
  freezed_annotation: ^3.1.0
  # extra tools
  crypto: ^3.0.7
  hive: ^2.2.3
  get_it: ^9.2.0

dev_dependencies:
  melos: ^7.3.0
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.3
  riverpod_generator: ^3.0.3
  auto_route_generator: ^10.2.6
  retrofit_generator: ^10.0.0
  json_serializable: ^6.11.2
  freezed: ^3.2.3
