name: flutter_arms
description: Flutter Arms - Clean Architecture + MVVM template.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  auto_route: ^10.2.0
  dio: ^5.9.0
  retrofit: ^4.7.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  hive_ce: ^2.13.0
  hive_ce_flutter: ^2.3.0
  talker: ^5.0.0
  talker_flutter: ^5.0.0
  talker_dio_logger: ^5.0.0
  slang: ^4.8.2
  slang_flutter: ^4.14.0
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.8.1
  build_runner: ^2.6.0
  riverpod_generator: ^3.0.3
  auto_route_generator: ^10.2.4
  retrofit_generator: ^10.1.2
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  slang_build_runner: ^4.8.2
  flutter_gen_runner: ^5.10.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
